<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Setup</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 5px;
            font-size: 28px;
            letter-spacing: 1px;
            color: #fff;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-outer {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            position: relative;
            border: 4px solid #32cd32;
            box-shadow: 0 0 20px rgba(50, 205, 50, 0.3);
        }
        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #32cd32;
            animation: ripple 2s infinite ease-out;
            opacity: 0;
            box-sizing: border-box;
        }
        @keyframes ripple {
            0 { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .scan-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #1e1e1e, #111);
            color: #32cd32;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.8), inset -4px -4px 8px rgba(255,255,255,0.05);
            letter-spacing: 1px;
            z-index: 2;
            transition: transform 0.1s;
        }
        .scan-btn:active {
            transform: scale(0.96);
        }
        #status {
            font-size: 15px;
            color: #00ffff;
            margin-bottom: 25px;
            min-height: 20px;
            font-family: monospace;
        }
        #installApp {
            background: #32cd32;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(50, 205, 50, 0.4);
            display: none;
            margin: 0 auto;
            transition: background 0.2s;
        }
        #installApp:hover {
            background: #2ebd2e;
        }
        .credentials-box {
            margin: 25px auto 10px auto;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(50, 205, 50, 0.15);
            border-radius: 12px;
            text-align: left;
        }
        .cred-title {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 12px;
            color: #666;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cred-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .cred-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .cred-text {
            font-size: 13px;
            color: #ccc;
        }
        .cred-val {
            color: #32cd32;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
        }
        .copy-btn {
            padding: 5px 10px;
            background: #111;
            color: #32cd32;
            border: 1px solid #32cd32;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 65px;
            text-align: center;
        }
        footer {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WiFi-Setup</h1>
    <div class="sub">Mobile Gateway Control</div>

    <a id="gatewayLink" href="http://192.168.100.1" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
        <div class="btn-outer">
            <div class="pulse"></div>
            <button class="scan-btn" type="button" onclick="startScan(event)">Scan</button>
        </div>
    </a>

    <div id="status">System Ready...</div>

    <button id="installApp">Install App Instantly</button>

    <div class="credentials-box">
        <div class="cred-title">Router Login Access</div>
        
        <div class="cred-row">
            <div class="cred-text">User: <span class="cred-val">telecomadmin</span></div>
            <button class="copy-btn" onclick="copyText('telecomadmin', this)">Copy</button>
        </div>
        <div class="cred-row" style="margin-bottom: 15px;">
            <div class="cred-text">Pass: <span class="cred-val">admintelecom</span></div>
            <button class="copy-btn" onclick="copyText('admintelecom', this)">Copy</button>
        </div>

        <div class="cred-row">
            <div class="cred-text">User: <span class="cred-val">root</span></div>
            <button class="copy-btn" onclick="copyText('root', this)">Copy</button>
        </div>
        <div class="cred-row">
            <div class="cred-text">Pass: <span class="cred-val">adminHW</span></div>
            <button class="copy-btn" onclick="copyText('adminHW', this)">Copy</button>
        </div>
    </div>

    <footer>Copyright 2026© Create by Kamran Khan</footer>
</div>

<script>
    // Automatic Gateway IP Target Logic
    async function startScan(event) {
        const st = document.getElementById('status');
        const targetLink = document.getElementById('gatewayLink');
        st.innerText = "🚀 Running Scan...";
        
        try {
            const ip = await detectIP();
            const gateway = ip.split('.').slice(0, 3).join('.') + '.1';
            st.innerHTML = `<span style="color:#32cd32;">✅ SUCCESS: ${gateway}</span>`;
            targetLink.href = `http://${gateway}`;
        } catch (e) {
            st.innerText = "Redirecting: 192.168.100.1";
            targetLink.href = "http://192.168.100.1";
        }
    }

    function detectIP() {
        return new Promise((res) => {
            const pc = new RTCPeerConnection();
            pc.createDataChannel("");
            pc.createOffer().then(pc.setLocalDescription.bind(pc));
            pc.onicecandidate = (i) => {
                if (!i || !i.candidate) return;
                const m = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate);
                if (m) { pc.close(); res(m[1]); }
            };
            setTimeout(() => res("192.168.100.1"), 1500);
        });
    }

    // Quick Clipboard Handler with Animated Button Response
    function copyText(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = button.innerText;
            button.innerText = "Copied!";
            button.style.background = "#32cd32";
            button.style.color = "#000";
            button.style.borderColor = "#32cd32";
            
            setTimeout(() => {
                button.innerText = originalText;
                button.style.background = "#111";
                button.style.color = "#32cd32";
                button.style.borderColor = "#32cd32";
            }, 1200);
        }).catch(err => {
            console.error("Copy failed: ", err);
        });
    }

    // Progressive Web App Custom Install Handlers
    let deferredPrompt;
    const installBtn = document.getElementById('installApp');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.style.display = 'none';
        }
        deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });

    // Domain-Compatible Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Live:', reg.scope))
                .catch(err => console.log('Worker Error:', err));
        });
    }
</script>

</body>
</html>
