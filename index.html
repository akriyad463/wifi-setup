<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIFI-SETUP</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            background-color: #030a16;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .router-img {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 15px #00a2ff;
        }
        .sub {
            color: #888;
            font-size: 15px;
            margin-top: 5px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .btn-outer {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
            background: rgba(0, 162, 255, 0.05);
        }
        .scan-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #00b3ff, #0088cc);
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.6);
            z-index: 2;
        }
        #status {
            font-size: 16px;
            color: #00ffff;
            margin-bottom: 30px;
            font-weight: bold;
        }
        #installApp {
            background: transparent;
            color: #00b3ff;
            border: 2px solid #00b3ff;
            padding: 12px 30px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
            letter-spacing: 1px;
            margin-bottom: 35px;
            display: none;
        }
        
        /* Matching original theme copy area */
        .cred-area {
            width: 280px;
            margin-top: 5px;
            text-align: center;
        }
        .cred-title {
            font-size: 11px;
            color: #555;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .cred-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .cred-row:last-child {
            margin-bottom: 0;
        }
        .cred-btn {
            padding: 5px 12px;
            background: transparent;
            color: #00b3ff;
            border: 1px solid #00b3ff;
            border-radius: 4px;
            cursor: pointer;
            width: 70px;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.2s;
        }
        footer {
            margin-top: 40px;
            font-size: 13px;
            color: #79a43b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img src="./img/router.png" class="router-img" alt="Router" onerror="this.src='https://i.imgur.com/w9Z3mXG.png'">

    <h1>WIFI-SETUP</h1>
    <div class="sub">Mobile Gateway Control</div>

    <a id="gatewayLink" href="http://192.168.100.1" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
        <div class="btn-outer">
            <button class="scan-btn" type="button" onclick="startScan(event)">SCAN</button>
        </div>
    </a>

    <div id="status">System Ready</div>

    <button id="installApp">INSTALL APP INSTANTLY</button>

    <div class="cred-area">
        <div class="cred-title">Router Login Access</div>
        
        <div class="cred-row">
            <span style="font-size: 14px; color: #fff;">User: <strong style="color: #00b3ff; font-family: monospace;">telecomadmin</strong></span>
            <button class="cred-btn" onclick="copyText('telecomadmin', this)">Copy</button>
        </div>
        <div class="cred-row" style="margin-bottom: 20px;">
            <span style="font-size: 14px; color: #fff;">Pass: <strong style="color: #00b3ff; font-family: monospace;">admintelecom</strong></span>
            <button class="cred-btn" onclick="copyText('admintelecom', this)">Copy</button>
        </div>

        <div class="cred-row">
            <span style="font-size: 14px; color: #fff;">User: <strong style="color: #00b3ff; font-family: monospace;">root</strong></span>
            <button class="cred-btn" onclick="copyText('root', this)">Copy</button>
        </div>
        <div class="cred-row">
            <span style="font-size: 14px; color: #fff;">Pass: <strong style="color: #00b3ff; font-family: monospace;">adminHW</strong></span>
            <button class="cred-btn" onclick="copyText('adminHW', this)">Copy</button>
        </div>
    </div>

    <footer>Copyright 2026© Create by Kamran Khan</footer>

<script>
    async function startScan(event) {
        const st = document.getElementById('status');
        const targetLink = document.getElementById('gatewayLink');
        st.innerText = "Running Scan...";
        
        try {
            const ip = await detectIP();
            const gateway = ip.split('.').slice(0, 3).join('.') + '.1';
            st.innerHTML = `<span style="color:#00ffff;">SUCCESS: ${gateway}</span>`;
            targetLink.href = `http://${gateway}`;
        } catch (e) {
            st.innerText = "Redirecting: 192.168.100.1";
            targetLink.href = "http://192.168.100.1";
        }
    }

    function detectIP() {
        return new Promise((res) => {
            const pc = new RTCPeerConnection();
            pc.createDataChannel("");
            pc.createOffer().then(pc.setLocalDescription.bind(pc));
            pc.onicecandidate = (i) => {
                if (!i || !i.candidate) return;
                const m = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate);
                if (m) { pc.close(); res(m[1]); }
            };
            setTimeout(() => res("192.168.100.1"), 1500);
        });
    }

    function copyText(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = button.innerText;
            button.innerText = "Copied!";
            button.style.background = "#00b3ff";
            button.style.color = "#000";
            
            setTimeout(() => {
                button.innerText = originalText;
                button.style.background = "transparent";
                button.style.color = "#00b3ff";
            }, 1200);
        }).catch(err => console.error(err));
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installApp');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            installBtn.style.display = 'none';
        }
        deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js');
        });
    }
</script>

</body>
</html>
